<!-- 
1️⃣ AND Operator (&&)
👉 दोन्ही condition true असतील तरच result true येतो

let age = 20;
let hasID = true;

if(age >= 18 && hasID){
  console.log("You can enter");
}

2️⃣ OR Operator (||)
👉 एक तरी condition true असेल तर result true
let isAdmin = false;
let isUser = true;

if(isAdmin || isUser){
  console.log("Access Granted");
}


3️⃣ NOT Operator (!)
value उलट करतो (true → false, false → true)

let isLoggedIn = false;

if(!isLoggedIn){
  console.log("Please Login");
}

1️⃣ ?? (Nullish Coalescing Operator)

👉 जर value null किंवा undefined असेल तर default value देतो

let name = null;

let result = name ?? "Guest";
console.log(result); // Gue



&&= (AND Assignment)

👉 जर left side true असेल तरच value assign होते

let isLoggedIn = true;

isLoggedIn &&= false;

console.log(isLoggedIn); // false


3️⃣ ||= (OR Assignment)

👉 जर left side false असेल तर value assign होते

let username = "";

username ||= "Guest";

console.log(username); // Guest

??= (Nullish Assignment)

👉 जर value null किंवा undefined असेल तरच assign होते

let user;

user ??= "Shubham";

console.log(user); // Shubham -->
