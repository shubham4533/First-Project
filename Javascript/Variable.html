<!-- Variable म्हणजे data store करण्यासाठी वापरलेली memory location.
JavaScript मध्ये 3 प्रकारचे variables असतात:

1.Var  var मध्ये scope problem येतो म्हणून आजकाल कमी वापरतात.
     value change करू शकतो
     same variable पुन्हा declare करू शकतो

2.let (Mordern variable ahe) 
     value change करू शकतो
     पण same variable पुन्हा declare करू शकत नाही
     let हा block scope असतो.

3.const
     const म्हणजे constant variable.
     value change करू शकत नाही
     declare केल्यावर value fix होते -->
