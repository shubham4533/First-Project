<!-- व्हा आपल्याला किती वेळा loop चालवायचा आहे हे माहीत असते तेव्हा for loop वापरतो.
    🔹 Syntax
for(initialization; condition; increment/decrement){
   // code
}

📌 Explanation:

initialization → loop कुठून सुरू होईल

condition → loop कधीपर्यंत चालेल

increment/decrement → value बदलते

1️⃣ Basic Example
for(let i = 1; i <= 5; i++){
  console.log(i);
}

👉 Output:

1
2
3
4
5 -->
