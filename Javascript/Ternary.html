<!-- Ternary Operator म्हणजे if-else चा short form (shortcut) आहे.

👉 एकाच line मध्ये condition लिहून result मिळवता येतो
condition ? true_value : false_value;

? → if
: → else
👉 म्हणजे:
condition ? if true : if false -->
