<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input_Style</title>
</head>
<body>
    <h1>Input Style Field</h1>
    <input type="text" id="name" placeholder="username">
    <button onclick="functionname()">submit</button>
    <script>
        document.getElementById("name").style.color="pink";
        function functionname(){
            document.getElementById("name").style.color="red";
            document.getElementById("name").style.width="400px";
            document.getElementById("name").style.height="100px";
            document.getElementById("name").style.fontSize="50px";


        }

    </script>
</body>
</html>
