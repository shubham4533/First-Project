<!-- 
JavaScript Conditional Statements (मराठीत समजावून)

Conditional Statement म्हणजे program मध्ये decision घेण्यासाठी वापरतात
👉 म्हणजे condition true/false नुसार code चालतो

1️⃣ if Statement

👉 जर condition true असेल तरच code run होतो

let age = 20;

if(age >= 18){
  console.log("You are adult");
}

📌 condition true → output येईल

2️⃣ if...else Statement

👉 condition true असेल तर if चालेल, नाहीतर else

let age = 16;

if(age >= 18){
  console.log("Adult");
}else{
  console.log("Minor");
}

📌 condition false → else run

3️⃣ if...else if...else

👉 multiple conditions check करण्यासाठी

let marks = 75;

if(marks >= 90){
  console.log("A Grade");
}else if(marks >= 60){
  console.log("B Grade");
}else{
  console.log("Fail");

  4️⃣ switch Statement

👉 multiple cases handle करण्यासाठी

let day = 2;

switch(day){
  case 1:
    console.log("Monday");
    break;
  case 2:
    console.log("Tuesday");
    break;
  default:
    console.log("Invalid day");
} -->
