<!-- JavaScript मध्ये मुख्यतः 2 प्रकारचे Data Types असतात:

1.Primitive Data Types हे simple values store करतात.
        (Type)           (Meaning)                                (Syantx)
    1. String     (Text) Text / अक्षरे store करण्यासाठी          let name = "Shubham";
    2. Number     Integer + Decimal दोन्ही                     let age = 22;  let price = 99.99;
    3. Boolean    True / False                               let isStudent = true;
    4. Undefined  Variable declare केला पण value दिली नाही    let x; console.log(x); // undefined
    5. Null       जाणूनबुजून value empty ठेवली                  let data = null;
    6. BigInt     खूप मोठे numbers handle करण्यासाठी            let bigNumber = 12345678901234567890n;
    7. Symbol     Unique value तयार करण्यासाठी (advanced use)  let id = Symbol("id");

2.Non-Primitive (Reference) Data Types

1. Array     Multiple values store करतो          let fruits = ["Apple", "Mango", "Banana"];
2. Object    Key-value pair data                 let person = {name: "Shubham",age: 22};
3. Function  Function पण एक data type आहे       function greet() {console.log("Hello");} -->
