<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function</title>
    <script>
//----- Declaration Function
        function functionName(){
            alert("Hello World")
        }
//----- Declaration Function
        function  add(a,b){
           console.log(a+b)
        }
//------Function call declaration cha addhi pn deu shkto 
        add(5,3);

    </script>
</head>
<body>
    <div>
        <h1>Function Type</h1>
        <!-- user-defind function -->
        <button onclick="functionName()">Submit</button>
        <button onclick="functionName()">Reset</button>
        <button onclick="functionName()">Entre</button>
        <!-- built - in Funtion -->
        <button onclick="alert('shubham patil')">Alert</button>
    </div>
</body>
</html>


<!-- Function म्हणजे एक reusable code block जो आपण पुन्हा पुन्हा वापरू शकतो.

 म्हणजेच एकदा code लिहा आणि गरज पडेल तेव्हा call करा. -->
