<!-- String Operators म्हणजे strings (text) वर operations करण्यासाठी वापरले जाणारे operators.
1️⃣ + (Concatenation Operator)

👉 दोन strings जोडण्यासाठी (combine) वापरतात

let firstName = "Shubham";
let lastName = "Patil";

let fullName = firstName + " " + lastName;
console.log(fullName);

👉 Output: Shubham Patil

4️⃣ Template Literals (Modern तरीका 🔥)

👉 ${} वापरून string मध्ये variables add करतात

let name = "Shubham";
let age = 22;

let info = `My name is ${name} and I am ${age} years old`;

console.log(info);

👉 Output:
My name is Shubham and I am 22 years old

| Operator | Use                      |
| -------- | ------------------------ |
| `+`      | strings जोडणे            |
| `+=`     | string मध्ये add करणे    |
| `${}`    | template string (modern) | -->
