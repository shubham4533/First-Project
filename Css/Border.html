<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border</title>
    <style>
        h1{
            border-width:2px;
            border-color:red;
            border-style:solid inset dotted dashed;
             /* <!--top  right bottom  left sites of border--> */
        }    

        h2{
            border:3px solid pink;
        }

        p{
            border-top:3px dotted black;
            border-bottom:2px solid gray;
        }

    </style>
</head>
<body>
    <h1>Welcome to page </h1>
    <h2>hello guys</h2>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Fuga, animi.</p>
</body>
</html>

<!-- CSS border property वापरून HTML element च्या भोवती कडा (border) तयार करतात.
border: width style color;
border-width:10px;
border-color:red;
border-style:solid; -->
