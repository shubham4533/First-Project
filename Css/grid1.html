<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabel</title>
</head>
<style>
    h1{
        color: brown;
        
    }
    .container{
        width:1080px;
        background:red;
        margin:30px 0px 0px 60px;
        padding:10px 10px 10px 10px;
        border:3px black solid;
        
        

        display:grid;
        grid-template-columns:repeat(2,150px);
        grid-template-rows:repeat(2,100px);
        grid-gap:15px 15px;

        /*implict & explicit karnya saathi*/
         grid-auto-rows:80px;
         grid-auto-flow:column; /*rows */
         grid-auto-columns:.5fr;


         /* align-items:end; /*start/end/center */
         /* justify-items:center; <---> text start/end/center use karnya saathi */
         /*shortlist of align- items and justify-items*/
         place-items:end center;

        /* <---> start(by deafault value),end,ceter,stretch space-around, space-between, space-evenly  */
         justify-content:center;
         /* start end center stretch space-around, space-between, space-evenly up rigth down left ni space dayach asel tr use kartat*/
         align-content:center;
        

    
    }
     .text1{
       
        background:yellowgreen;
        /* grid-row-start:2;
        grid-row-end:3;
        grid-column-start:3;
        grid-column-end:4; */
    

        grid-area:2/3/3/4;
         
       

    }
    .text2{
        background:yellow;
        /* align-self:center;  start; end; stretch-by deafault value ahe   
        justify-self:center;  <---> text start/end/center use karnya saathi  */
        place-self:center center;
      
    }
    .text3{
       background:green;
       
        
    }
    .text4{
        
        background:olive;
    }
    .text5{
    
        background:rebeccapurple;
          grid-row:1/2;
          grid-column:2/4;
    }
         
    .text6{ 
        background:darkmagenta;
        grid-row:3/4;
        grid-column:1/4;

    }
    .text7{
        background:hotpink;
        

    }
    .text8{
        background:olive;
    }
</style>
<body>
    <h1><u><b>GRID OF TABEL</b></u></h1>
    <div class="container">
        <div class="text1">FIRST</div>
        <div class="text2">SECOND</div>
        <div class="text3">THREE</div>
        <div class="text4">FOUR</div>
        <div class="text5">FIVE</div>
        <div class="text6">SIX</div>
        <div class="text7">seven</div>
        <div class="text8">eight</div>
    </div>
</body>
</html>
