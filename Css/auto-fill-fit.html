<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTO-FILL-FIT</title>
        <style>
            .container{
                background:yellow;
                width:500px;
                margin:10px 0 0 10px;

                display:grid;
                /* grid-template-columns:repeat(auto-fill,100px); */
                grid-template-columns:repeat(2,240px);
                grid-template-rows:repeat(3,150px) ;

                grid-gap:15px 15px;

            }
            .text1{
                background:red;
                /*positioning of items*/
                /* order:3; */

            }
            .text2{
                background:blue;
                /* order:2; */
            }
            .text3{
                background:green;
                /* //nested-grid */
                display:grid;
                 grid-template-columns:1fr 1fr;
                 grid-gap: 10px;
            
            }
            /* //nested-grid */
            .text3 > div{
                background:hotpink;
                color:black;
                padding:10px;
            }
            .text4{
                background:palevioletred;
                
                /* grid-column-end:-1; */

            }
            .text5{
                background:indianred;
                
            }
            .text6{
                background:khaki;
            }
        </style>
</head>
<body>
    <div class="container">
    <div class="text1">one</div>
    <div class="text2">two</div>
    <div class="text3">
     <!-- //nested-grid -->
      <div class="subitem1">A</div>
      <div class="subitem2">B</div>
      <div class="subitem3">C</div>
   </div>
    <div class="text4">four</div>
    <div class="text5">five</div>
    <div class="text6">six</div>
    </div>
</body>
</html>
